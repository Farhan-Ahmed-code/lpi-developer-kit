name: Validate Submission

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect submission level
        id: level
        run: |
          FILES=$(git diff --name-only origin/main...HEAD 2>/dev/null || echo "")

          if echo "$FILES" | grep -q "^contributors/"; then
            echo "level=1" >> $GITHUB_OUTPUT
          fi
          if echo "$FILES" | grep -q "^submissions/"; then
            echo "level=2" >> $GITHUB_OUTPUT
          fi
          # Level 3 is a separate repo — linked in submissions/

      - name: Validate Level 1 — Contributor JSON
        if: steps.level.outputs.level == '1'
        run: |
          for f in $(git diff --name-only origin/main...HEAD | grep "^contributors/" | grep ".json$"); do
            echo "Validating $f..."

            # Check it's valid JSON
            if ! python3 -c "import json; json.load(open('$f'))"; then
              echo "::error::$f is not valid JSON"
              exit 1
            fi

            # Check required fields
            python3 -c "
          import json, sys
          data = json.load(open('$f'))
          required = ['name', 'github', 'program', 'campus', 'skills', 'interests', 'my_twin']
          missing = [k for k in required if k not in data]
          if missing:
              print(f'::error::$f missing fields: {missing}')
              sys.exit(1)
          if not isinstance(data['skills'], list):
              print('::error::skills must be a list')
              sys.exit(1)
          if not isinstance(data['interests'], list):
              print('::error::interests must be a list')
              sys.exit(1)
          if len(data['my_twin']) < 10:
              print('::error::my_twin must be at least 10 characters')
              sys.exit(1)
          print(f'$f is valid')
          "
          done

      - name: Label PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const files = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const paths = files.data.map(f => f.filename);
            const labels = [];

            if (paths.some(p => p.startsWith('contributors/'))) labels.push('level-1');
            if (paths.some(p => p.startsWith('submissions/'))) labels.push('level-2');

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: labels,
              });
            }
